{{ $page := . }}

<!-- Featured / Hero Card — full overlay image style -->
<article class="group relative rounded-2xl overflow-hidden h-full min-h-[420px] shadow-[0_8px_40px_rgba(0,0,0,0.12)] hover:shadow-[0_16px_60px_rgba(104,40,222,0.22)] transition-all duration-500 hover:-translate-y-1 cursor-pointer">

  <!-- Background Image or Gradient -->
  <a href="{{ $page.RelPermalink }}" class="absolute inset-0 block">
    {{ with $page.Params.image }}
    <img src="{{ . | relURL }}" alt="{{ $page.Title }}"
         class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
    {{ else }}
    <div class="w-full h-full bg-gradient-to-br from-imperial-900 via-imperial-800 to-stone-900 relative overflow-hidden">
      <div class="absolute inset-0 opacity-[0.07]"
           style="background-image: radial-gradient(circle, #8b65ff 1px, transparent 1px); background-size: 28px 28px;"></div>
      <div class="absolute top-1/3 left-0 right-0 h-px bg-liminal-600/20"></div>
      <div class="absolute bottom-1/3 left-0 right-0 h-px bg-liminal-700/10"></div>
    </div>
    {{ end }}

    <!-- Dark gradient overlay — bottom up -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/50 to-transparent"></div>
    <!-- Left imperial accent glow -->
    <div class="absolute bottom-0 left-0 w-1 h-2/3 bg-gradient-to-t from-liminal-700 to-transparent"></div>
  </a>

  <!-- Content — sits on top of the overlay -->
  <div class="absolute inset-0 flex flex-col justify-end p-7 md:p-9 pointer-events-none">

    {{ with $page.Params.categories }}
    <div class="mb-4 pointer-events-auto">
      <span class="inline-block bg-liminal-700 text-white text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider shadow-lg">
        {{ index . 0 }}
      </span>
    </div>
    {{ end }}

    <h2 class="font-display font-bold text-2xl md:text-3xl lg:text-4xl text-white leading-tight mb-3 group-hover:text-liminal-300 transition-colors pointer-events-auto">
      <a href="{{ $page.RelPermalink }}">{{ $page.Title }}</a>
    </h2>

    {{ with $page.Description }}
    <p class="text-stone-300 text-sm md:text-base leading-relaxed mb-5 max-w-2xl line-clamp-2 font-light">{{ . }}</p>
    {{ end }}

    <div class="flex items-center gap-3 text-xs text-stone-400 pointer-events-auto">
      <time datetime="{{ $page.Date.Format "2006-01-02" }}">{{ partial "date-tr.html" $page.Date }}</time>
      <span class="text-stone-600">·</span>
      <span>{{ $page.ReadingTime }} dk okuma</span>
    </div>
  </div>

</article>
