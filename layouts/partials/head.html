<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .IsHome }}{{ .Site.Params.description }}{{ else if .Summary }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="author" content="{{ .Site.Params.author }}">

{{ if .IsHome }}
<title>{{ .Site.Title }} — {{ .Site.Params.tagline }}</title>
{{ else }}
<title>{{ .Title }} | {{ .Site.Title }}</title>
{{ end }}

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<!-- Tailwind CSS CDN (typography plugin dahil) -->
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          /* Liminal — sanity ve delilik arasındaki eşik rengi */
          liminal: {
            50:  '#f5f3ff',
            100: '#eceaff',
            200: '#dbd7ff',
            300: '#c2baff',
            400: '#a590ff',
            500: '#8b65ff',
            600: '#7940f5',
            700: '#6828de',
            800: '#5620b5',
            900: '#471c96',
            950: '#2c0f60',
          },
        },
        fontFamily: {
          sans:    ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          display: ['"TAN Meringue"', '"Plus Jakarta Sans"', 'sans-serif'],
        },
      },
    },
  }
</script>

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="{{ if .Params.image }}summary_large_image{{ else }}summary{{ end }}">
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
{{ with .Params.image }}<meta name="twitter:image" content="{{ . | absURL }}">{{ end }}

{{ if .IsPage }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
<meta property="article:modified_time" content="{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}">
{{ end }}

<!-- Yapısal Veri (JSON-LD) -->
{{ if .IsHome }}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":{{ .Site.Title | jsonify }},"url":{{ .Site.BaseURL | jsonify }},"description":{{ .Site.Params.description | jsonify }},"inLanguage":"tr"}
</script>
{{ else if .IsPage }}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Article","headline":{{ .Title | jsonify }},"description":{{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | plainify | truncate 160 | jsonify }}{{ end }},"datePublished":{{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},"dateModified":{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},"author":{"@type":"Person","name":{{ .Site.Params.author | jsonify }}},"publisher":{"@type":"Organization","name":{{ .Site.Title | jsonify }}},"url":{{ .Permalink | jsonify }}{{ with .Params.image }},"image":{{ . | absURL | jsonify }}{{ end }}}
</script>
{{ end }}

<!-- Custom CSS -->
<link rel="stylesheet" href="/css/custom.css">
